<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anki FSRS + SM18 (Single File)</title>

    <style>
      :root {
        --bg: #0b0d10;
        --panel: #12161c;
        --panel2: #0f1318;
        --text: #e9eef5;
        --muted: #aab4c2;
        --border: #222a35;
        --danger: #ff5c6c;
        --ok: #44d19d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: linear-gradient(180deg, #07080a, var(--bg));
        color: var(--text);
      }
      a { color: inherit; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
      .top {
        display:flex; gap:12px; align-items:center; justify-content:space-between;
        padding: 14px 16px; border: 1px solid var(--border); border-radius: 18px;
        background: rgba(18,22,28,.9); backdrop-filter: blur(6px);
        position: sticky; top: 10px; z-index: 5;
      }
      .title { font-weight: 800; letter-spacing: .2px; }
      .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .grid { display:grid; grid-template-columns: 360px 1fr; gap: 14px; margin-top: 14px; }
      @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } .top{ position:static; } }
      .card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(18,22,28,.85);
        padding: 14px;
      }
      .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      .row > * { flex: none; }
      .sp { justify-content: space-between; }
      input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel2);
        color: var(--text);
        outline: none;
      }
      textarea { min-height: 92px; resize: vertical; }
      button {
        border: 1px solid var(--border);
        background: #141a22;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.07); }
      button.primary { background: #1a2735; border-color: #2a3a50; }
      button.danger { background: rgba(255,92,108,.12); border-color: rgba(255,92,108,.35); color: #ffd8dc; }
      button.ok { background: rgba(68,209,157,.12); border-color: rgba(68,209,157,.35); color: #d6fff0; }
      .pill {
        padding: 6px 10px; border-radius: 999px; border:1px solid var(--border);
        background: rgba(12,16,22,.7); color: var(--muted); font-size: 12px;
      }
      .list { margin-top: 10px; display:flex; flex-direction:column; gap:8px; }
      .item {
        padding: 10px; border-radius: 14px; border:1px solid var(--border);
        background: rgba(12,16,22,.7);
        display:flex; gap:10px; align-items:flex-start; justify-content:space-between;
      }
      .item .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
      .item .front { font-weight: 650; }
      .item .actions { display:flex; gap:8px; }
      .hr { height:1px; background: var(--border); margin: 12px 0; }
      .big {
        font-size: 22px; font-weight: 850; letter-spacing: .2px;
      }
      .reviewBox {
        border:1px solid var(--border);
        border-radius: 18px;
        background: rgba(12,16,22,.6);
        padding: 14px;
      }
      .face {
        white-space: pre-wrap;
        font-size: 18px;
        line-height: 1.35;
        padding: 10px 6px;
      }
      .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
      .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono"; font-size: 12px; }
      .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
      .btnRow button { flex:1; min-width: 120px; }
      .small { font-size: 12px; color: var(--muted); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono"; }
      .two { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      @media (max-width: 720px){ .two{ grid-template-columns: 1fr; } }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel (JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      // =========================
      // FSRS 4.5 core
      // =========================
      const DEFAULT_W_45 = [
        0.4872, 1.4003, 3.7145, 13.8206, 5.1618, 1.2298, 0.8975, 0.031, 1.6474,
        0.1367, 1.0461, 2.1072, 0.0793, 0.3246, 1.587, 0.2272, 2.8755,
      ];

      const DECAY = -0.5;
      const FACTOR = 19 / 81;

      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
      const now = () => Date.now();
      const daysToMs = (d) => d * 24 * 60 * 60 * 1000;
      const msToDays = (ms) => ms / (1000 * 60 * 60 * 24);
      const uid = (p="id") => `${p}_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`;

      function retrievability(tDays, S) {
        if (S <= 0) return 0;
        const base = 1 + FACTOR * (tDays / S);
        return Math.pow(base, DECAY);
      }

      function intervalFromRetention(r, S) {
        const rr = clamp(r, 0.01, 0.999);
        const term = Math.pow(rr, 1 / DECAY) - 1;
        const I = (S / FACTOR) * term;
        return Math.max(1, I);
      }

      function initialStability(w, G) {
        return w[G - 1];
      }

      function initialDifficulty(w, G) {
        const w4 = w[4];
        const w5 = w[5];
        const D0 = w4 - (G - 3) * w5;
        return clamp(D0, 1, 10);
      }

      function nextDifficulty(w, D, G) {
        const w6 = w[6];
        const w7 = w[7];
        const D0_3 = w[4];
        const raw = D - w6 * (G - 3);
        const Dp = w7 * D0_3 + (1 - w7) * raw;
        return clamp(Dp, 1, 10);
      }

      function stabilityAfterSuccess(w, D, S, R, G) {
        const w8 = w[8];
        const w9 = w[9];
        const w10 = w[10];
        const w15 = w[15];
        const w16 = w[16];

        const hardFactor = G === 2 ? w15 : 1;
        const easyFactor = G === 4 ? w16 : 1;

        const a = Math.exp(w8);
        const b = 11 - D;
        const c = Math.pow(S, -w9);
        const d = Math.exp(w10 * (1 - R)) - 1;

        const inc = a * b * c * d * hardFactor * easyFactor + 1;
        const Sp = S * inc;
        return Math.max(0.01, Sp);
      }

      function stabilityAfterFail(w, D, S, R) {
        const w11 = w[11];
        const w12 = w[12];
        const w13 = w[13];
        const w14 = w[14];

        const a = w11;
        const b = Math.pow(D, -w12);
        const c = Math.pow(S + 1, w13) - 1;
        const d = Math.exp(w14 * (1 - R));

        const Sp = a * b * c * d;
        return Math.max(0.01, Sp);
      }

      function defaultCardState() {
        return {
          stability: 0,
          difficulty: 0,
          reps: 0,
          lapses: 0,
          lastReviewAt: null,
          dueAt: now(),
        };
      }

      // =========================
      // Storage
      // =========================
      const STORAGE_KEY = "anki_fsrs_sm18_singlefile_v1";

      function loadApp() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }
      function saveApp(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      // =========================
      // UI helpers
      // =========================
      function fmtDate(ms) {
        const d = new Date(ms);
        return d.toLocaleString();
      }

      function countDue(cards, deckId) {
        const t = now();
        return cards.filter(c => c.deckId === deckId && c.state.dueAt <= t).length;
      }

      function computeTargetRetention(fiPct) {
        const fi = clamp(fiPct, 0, 50) / 100;
        return clamp(1 - fi, 0.5, 0.99);
      }

      function exportJson(state) {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "anki-fsrs-sm18-export.json";
        a.click();
        URL.revokeObjectURL(url);
      }

      function App() {
        // -------------------------
        // Init
        // -------------------------
        const loaded = useMemo(() => loadApp(), []);
        const [settings, setSettings] = useState(() => loaded?.settings ?? ({
          forgettingIndexPct: 10,
          w: DEFAULT_W_45.slice(),
          againStepMinutes: 10,
        }));
        const [decks, setDecks] = useState(() => loaded?.decks ?? [
          { id: uid("deck"), name: "Gestão de Projetos", createdAt: now() },
        ]);
        const [cards, setCards] = useState(() => loaded?.cards ?? []);
        const [activeDeckId, setActiveDeckId] = useState(() => loaded?.activeDeckId ?? (loaded?.decks?.[0]?.id ?? null));
        const [tab, setTab] = useState(() => "review"); // review | manage | settings

        // Create deck form
        const [newDeckName, setNewDeckName] = useState("");

        // Create/edit card
        const [front, setFront] = useState("");
        const [back, setBack] = useState("");
        const [editingId, setEditingId] = useState(null);

        // Review session
        const [showAnswer, setShowAnswer] = useState(false);
        const [reviewQueue, setReviewQueue] = useState([]);
        const [currentId, setCurrentId] = useState(null);

        const targetRetention = useMemo(
          () => computeTargetRetention(settings.forgettingIndexPct),
          [settings.forgettingIndexPct]
        );

        // Persist
        useEffect(() => {
          saveApp({ settings, decks, cards, activeDeckId });
        }, [settings, decks, cards, activeDeckId]);

        // Ensure active deck exists
        useEffect(() => {
          if (!activeDeckId && decks.length) setActiveDeckId(decks[0].id);
        }, [activeDeckId, decks]);

        const activeDeck = useMemo(() => decks.find(d => d.id === activeDeckId) ?? null, [decks, activeDeckId]);

        const deckCards = useMemo(() => cards.filter(c => c.deckId === activeDeckId), [cards, activeDeckId]);

        const dueCards = useMemo(() => {
          const t = now();
          return deckCards.filter(c => c.state.dueAt <= t).sort((a,b) => a.state.dueAt - b.state.dueAt);
        }, [deckCards]);

        // Build / refresh review queue
        function startReview() {
          const ids = dueCards.map(c => c.id);
          setReviewQueue(ids);
          setCurrentId(ids[0] ?? null);
          setShowAnswer(false);
        }

        useEffect(() => {
          // auto refresh queue when switching decks
          setReviewQueue([]);
          setCurrentId(null);
          setShowAnswer(false);
        }, [activeDeckId]);

        const currentCard = useMemo(() => cards.find(c => c.id === currentId) ?? null, [cards, currentId]);

        // Keyboard shortcuts: space to flip, 1-4 to rate
        useEffect(() => {
          function onKey(e) {
            if (tab !== "review") return;
            if (!currentCard) return;

            if (e.code === "Space") {
              e.preventDefault();
              setShowAnswer(s => !s);
            }
            if (showAnswer) {
              if (e.key === "1") onRate(1);
              if (e.key === "2") onRate(2);
              if (e.key === "3") onRate(3);
              if (e.key === "4") onRate(4);
            }
          }
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [tab, currentCard, showAnswer]);

        // -------------------------
        // Deck actions
        // -------------------------
        function addDeck() {
          const name = newDeckName.trim();
          if (!name) return;
          const d = { id: uid("deck"), name, createdAt: now() };
          setDecks(ds => [d, ...ds]);
          setActiveDeckId(d.id);
          setNewDeckName("");
        }

        function deleteDeck(id) {
          if (!confirm("Apagar este baralho e todos os cards?")) return;
          setDecks(ds => ds.filter(d => d.id !== id));
          setCards(cs => cs.filter(c => c.deckId !== id));
          if (activeDeckId === id) setActiveDeckId(decks.find(d => d.id !== id)?.id ?? null);
        }

        // -------------------------
        // Card actions
        // -------------------------
        function resetEditor() {
          setFront("");
          setBack("");
          setEditingId(null);
        }

        function saveCard() {
          if (!activeDeckId) return;
          const f = front.trim();
          const b = back.trim();
          if (!f || !b) return;

          if (editingId) {
            setCards(cs => cs.map(c => c.id === editingId ? { ...c, front: f, back: b } : c));
          } else {
            const c = {
              id: uid("card"),
              deckId: activeDeckId,
              front: f,
              back: b,
              createdAt: now(),
              state: defaultCardState(),
            };
            setCards(cs => [c, ...cs]);
          }
          resetEditor();
        }

        function editCard(card) {
          setEditingId(card.id);
          setFront(card.front);
          setBack(card.back);
          setTab("manage");
        }

        function deleteCard(id) {
          if (!confirm("Apagar este card?")) return;
          setCards(cs => cs.filter(c => c.id !== id));
        }

        function buryCard(id, days=1) {
          // push due date forward
          setCards(cs => cs.map(c => {
            if (c.id !== id) return c;
            return { ...c, state: { ...c.state, dueAt: now() + daysToMs(days) } };
          }));
        }

        // -------------------------
        // Review scheduler logic
        // -------------------------
        function schedule(card, rating) {
          const w = settings.w;
          const tNow = now();

          const st = card.state;
          const last = st.lastReviewAt;
          const elapsedDays = last ? Math.max(0, msToDays(tNow - last)) : 0;

          // If new card: initialize S/D on first rating
          let S = st.stability;
          let D = st.difficulty;

          // Retrievability right before review
          const R = (last && S > 0) ? retrievability(elapsedDays, S) : 0;

          let reps = st.reps;
          let lapses = st.lapses;

          // Determine success/fail: rating 1 = fail, else success
          const success = rating !== 1;

          if (reps === 0) {
            // initialize using first rating as "grade"
            S = initialStability(w, rating);
            D = initialDifficulty(w, rating);
          } else {
            // update difficulty
            D = nextDifficulty(w, D, rating);

            // update stability
            if (success) {
              S = stabilityAfterSuccess(w, D, S, R, rating);
            } else {
              S = stabilityAfterFail(w, D, S, R);
            }
          }

          reps += 1;
          if (!success) lapses += 1;

          // Schedule next due
          let dueAt = tNow;

          if (rating === 1) {
            // Again: short step (learning) in minutes
            dueAt = tNow + settings.againStepMinutes * 60 * 1000;
          } else {
            // Use target retention derived from FI
            const I = intervalFromRetention(targetRetention, S); // days
            dueAt = tNow + daysToMs(I);
          }

          return {
            ...card,
            state: {
              ...st,
              stability: S,
              difficulty: D,
              reps,
              lapses,
              lastReviewAt: tNow,
              dueAt,
            }
          };
        }

        function onRate(rating) {
          if (!currentCard) return;

          // update card
          setCards(cs => cs.map(c => c.id === currentCard.id ? schedule(c, rating) : c));

          // next in queue: rebuild after state updates (simple: pop)
          setShowAnswer(false);
          setReviewQueue(q => {
            const rest = q.filter(id => id !== currentCard.id);
            setCurrentId(rest[0] ?? null);
            return rest;
          });
        }

        // -------------------------
        // Import / Export
        // -------------------------
        function importJsonFile(file) {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const data = JSON.parse(reader.result);
              if (!data || !data.decks || !data.cards || !data.settings) throw new Error("Formato inválido");
              setSettings(data.settings);
              setDecks(data.decks);
              setCards(data.cards);
              setActiveDeckId(data.activeDeckId ?? data.decks?.[0]?.id ?? null);
              alert("Importado com sucesso.");
            } catch (e) {
              alert("Falha ao importar: " + (e?.message ?? "erro"));
            }
          };
          reader.readAsText(file);
        }

        // -------------------------
        // Derived stats
        // -------------------------
        const stats = useMemo(() => {
          const t = now();
          const total = deckCards.length;
          const due = deckCards.filter(c => c.state.dueAt <= t).length;
          const newCount = deckCards.filter(c => c.state.reps === 0).length;
          const learned = total - newCount;
          return { total, due, newCount, learned };
        }, [deckCards]);

        // Current card state info for UI
        const currentInfo = useMemo(() => {
          if (!currentCard) return null;
          const st = currentCard.state;
          const tNow = now();
          const elapsedDays = st.lastReviewAt ? Math.max(0, msToDays(tNow - st.lastReviewAt)) : 0;
          const R = (st.lastReviewAt && st.stability > 0) ? retrievability(elapsedDays, st.stability) : null;
          return { elapsedDays, R };
        }, [currentCard]);

        // -------------------------
        // Render
        // -------------------------
        return (
          <div className="wrap">
            <div className="top">
              <div>
                <div className="title">Anki Digital — FSRS + SM18-ish (Single File)</div>
                <div className="sub">
                  Baralho: <span className="mono">{activeDeck?.name ?? "(nenhum)"}</span> •
                  <span className="pill" style={{marginLeft: 10}}>FI {settings.forgettingIndexPct}% → Retenção alvo {Math.round(targetRetention*100)}%</span>
                </div>
              </div>

              <div className="row">
                <button className={tab==="review" ? "primary" : ""} onClick={() => setTab("review")}>Revisar</button>
                <button className={tab==="manage" ? "primary" : ""} onClick={() => setTab("manage")}>Cards</button>
                <button className={tab==="settings" ? "primary" : ""} onClick={() => setTab("settings")}>Config</button>
              </div>
            </div>

            <div className="grid">
              {/* Left: Decks */}
              <div className="card">
                <div className="row sp">
                  <div className="big">Baralhos</div>
                  <span className="pill">{decks.length}</span>
                </div>

                <div className="row" style={{marginTop:10}}>
                  <input
                    placeholder="Novo baralho (ex: U1 Aula 1)"
                    value={newDeckName}
                    onChange={e => setNewDeckName(e.target.value)}
                    onKeyDown={e => (e.key==="Enter" ? addDeck() : null)}
                  />
                  <button className="primary" onClick={addDeck}>Criar</button>
                </div>

                <div className="list">
                  {decks.map(d => {
                    const due = countDue(cards, d.id);
                    const active = d.id === activeDeckId;
                    return (
                      <div key={d.id} className="item" style={{outline: active ? "1px solid #2a3a50" : "none"}}>
                        <div style={{minWidth:0}}>
                          <div className="front" style={{wordBreak:"break-word"}}>{d.name}</div>
                          <div className="meta">
                            Criado: {new Date(d.createdAt).toLocaleDateString()} •
                            <span className="pill" style={{marginLeft:8}}>Due: {due}</span>
                          </div>
                        </div>
                        <div className="actions">
                          <button onClick={() => setActiveDeckId(d.id)}>Abrir</button>
                          <button className="danger" onClick={() => deleteDeck(d.id)}>Apagar</button>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="hr"></div>
                <div className="row sp">
                  <div className="small">Backup</div>
                  <div className="row">
                    <button onClick={() => exportJson({ settings, decks, cards, activeDeckId })}>Exportar</button>
                    <label style={{display:"inline-block"}}>
                      <input
                        type="file"
                        accept="application/json"
                        style={{display:"none"}}
                        onChange={e => {
                          const f = e.target.files?.[0];
                          if (f) importJsonFile(f);
                          e.target.value = "";
                        }}
                      />
                      <button>Importar</button>
                    </label>
                  </div>
                </div>
              </div>

              {/* Right: Main */}
              <div className="card">
                {tab === "review" && (
                  <>
                    <div className="row sp">
                      <div className="big">Revisão</div>
                      <div className="row">
                        <span className="pill">Total: {stats.total}</span>
                        <span className="pill">Novos: {stats.newCount}</span>
                        <span className="pill">Due: {stats.due}</span>
                      </div>
                    </div>

                    <div className="hr"></div>

                    {(!activeDeckId || !activeDeck) ? (
                      <div className="small">Crie ou selecione um baralho.</div>
                    ) : (
                      <>
                        <div className="row sp">
                          <div className="small">
                            Atalhos: <span className="kbd">Espaço</span> (virar) •
                            <span className="kbd"> 1</span> Again • <span className="kbd">2</span> Hard • <span className="kbd">3</span> Good • <span className="kbd">4</span> Easy
                          </div>
                          <div className="row">
                            <button className="primary" onClick={startReview}>Carregar Due</button>
                          </div>
                        </div>

                        <div style={{marginTop: 12}} className="reviewBox">
                          {!currentCard ? (
                            <div className="small">
                              {dueCards.length === 0
                                ? "Nada vencido agora. Adicione cards ou aguarde o próximo agendamento."
                                : "Clique em “Carregar Due” para iniciar."}
                            </div>
                          ) : (
                            <>
                              <div className="face">{currentCard.front}</div>
                              <div className="hr"></div>
                              {showAnswer ? (
                                <div className="face" style={{opacity:.95}}>{currentCard.back}</div>
                              ) : (
                                <div className="hint">Pressione <span className="kbd">Espaço</span> para ver a resposta.</div>
                              )}

                              {currentInfo && (
                                <div className="hint">
                                  Estado: S={currentCard.state.stability.toFixed(2)} • D={currentCard.state.difficulty.toFixed(2)} • reps={currentCard.state.reps} • lapses={currentCard.state.lapses}
                                  {currentCard.state.lastReviewAt && (
                                    <> • último={fmtDate(currentCard.state.lastReviewAt)} • t={currentInfo.elapsedDays.toFixed(2)}d • R≈{currentInfo.R ? (currentInfo.R*100).toFixed(1) : "—"}%</>
                                  )}
                                </div>
                              )}

                              <div className="btnRow">
                                <button
                                  className="danger"
                                  onClick={() => showAnswer && onRate(1)}
                                  title="1"
                                >Again</button>
                                <button onClick={() => showAnswer && onRate(2)} title="2">Hard</button>
                                <button className="ok" onClick={() => showAnswer && onRate(3)} title="3">Good</button>
                                <button className="primary" onClick={() => showAnswer && onRate(4)} title="4">Easy</button>
                              </div>

                              <div className="hint">
                                Dica: você pode “enterrar” um card por 1 dia no modo Cards.
                              </div>
                            </>
                          )}
                        </div>
                      </>
                    )}
                  </>
                )}

                {tab === "manage" && (
                  <>
                    <div className="row sp">
                      <div className="big">Cards</div>
                      <span className="pill">{deckCards.length}</span>
                    </div>

                    <div className="hr"></div>

                    {!activeDeckId ? (
                      <div className="small">Selecione um baralho.</div>
                    ) : (
                      <>
                        <div className="two">
                          <div>
                            <div className="small">Frente</div>
                            <textarea value={front} onChange={e=>setFront(e.target.value)} placeholder="Pergunta / termo / enunciado" />
                          </div>
                          <div>
                            <div className="small">Verso</div>
                            <textarea value={back} onChange={e=>setBack(e.target.value)} placeholder="Resposta / definição / explicação" />
                          </div>
                        </div>

                        <div className="row" style={{marginTop: 10}}>
                          <button className="primary" onClick={saveCard}>{editingId ? "Salvar edição" : "Adicionar card"}</button>
                          <button onClick={resetEditor}>Limpar</button>
                          {editingId && <span className="pill">Editando: <span className="mono">{editingId}</span></span>}
                        </div>

                        <div className="hr"></div>

                        <div className="list">
                          {deckCards.length === 0 && (
                            <div className="small">Sem cards ainda. Crie o primeiro acima.</div>
                          )}

                          {deckCards.map(c => {
                            const dueIn = c.state.dueAt - now();
                            const dueLabel = dueIn <= 0 ? "DUE" : `em ~${Math.ceil(msToDays(dueIn))}d`;
                            return (
                              <div key={c.id} className="item">
                                <div style={{minWidth:0}}>
                                  <div className="front" style={{wordBreak:"break-word"}}>{c.front}</div>
                                  <div className="meta">
                                    <span className="pill">{dueLabel}</span>
                                    <span className="pill" style={{marginLeft:8}}>S={c.state.stability.toFixed(2)}</span>
                                    <span className="pill" style={{marginLeft:8}}>D={c.state.difficulty.toFixed(2)}</span>
                                    <span className="pill" style={{marginLeft:8}}>reps={c.state.reps}</span>
                                    <span className="pill" style={{marginLeft:8}}>lapses={c.state.lapses}</span>
                                  </div>
                                </div>
                                <div className="actions">
                                  <button onClick={() => editCard(c)}>Editar</button>
                                  <button onClick={() => buryCard(c.id, 1)}>Enterrar 1d</button>
                                  <button className="danger" onClick={() => deleteCard(c.id)}>Apagar</button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </>
                    )}
                  </>
                )}

                {tab === "settings" && (
                  <>
                    <div className="row sp">
                      <div className="big">Configurações</div>
                      <span className="pill">LocalStorage</span>
                    </div>

                    <div className="hr"></div>

                    <div className="two">
                      <div>
                        <div className="small">Forgetting Index (SM18-ish) — % que você aceita esquecer</div>
                        <input
                          type="number"
                          min="0"
                          max="50"
                          step="1"
                          value={settings.forgettingIndexPct}
                          onChange={e => setSettings(s => ({ ...s, forgettingIndexPct: Number(e.target.value) }))}
                        />
                        <div className="hint">
                          FI {settings.forgettingIndexPct}% ⇒ retenção alvo ≈ <b>{Math.round(targetRetention*100)}%</b> no momento da revisão.
                        </div>
                      </div>

                      <div>
                        <div className="small">Again step (minutos)</div>
                        <input
                          type="number"
                          min="1"
                          max="120"
                          step="1"
                          value={settings.againStepMinutes}
                          onChange={e => setSettings(s => ({ ...s, againStepMinutes: Number(e.target.value) }))}
                        />
                        <div className="hint">
                          Quando você marca <b>Again</b>, o card volta após esse tempo (modo “learning” simples).
                        </div>
                      </div>
                    </div>

                    <div className="hr"></div>

                    <div className="small">Parâmetros FSRS (w[0..16])</div>
                    <div className="hint">
                      Você pode deixar nos padrões. Se mexer, faça backup antes.
                    </div>

                    <div style={{marginTop: 10}}>
                      <textarea
                        className="mono"
                        value={JSON.stringify(settings.w)}
                        onChange={e => {
                          try {
                            const arr = JSON.parse(e.target.value);
                            if (Array.isArray(arr) && arr.length === 17 && arr.every(x => typeof x === "number")) {
                              setSettings(s => ({ ...s, w: arr }));
                            }
                          } catch {}
                        }}
                      />
                      <div className="row" style={{marginTop: 10}}>
                        <button onClick={() => setSettings(s => ({ ...s, w: DEFAULT_W_45.slice() }))}>Restaurar padrão FSRS 4.5</button>
                        <button className="danger" onClick={() => {
                          if (!confirm("Isso vai apagar tudo do LocalStorage (decks, cards e config). Continuar?")) return;
                          localStorage.removeItem(STORAGE_KEY);
                          location.reload();
                        }}>Reset total</button>
                      </div>
                    </div>

                    <div className="hr"></div>

                    <div className="hint">
                      Referências: FSRS-4.5 (wiki do FSRS4Anki) e conceito de Forgetting Index do SuperMemo.
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
