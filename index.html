<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistemas Operacionais — Estudo Guiado (Index único)</title>
  <style>
    :root{
      --bg:#0b0f14; --panel:#121a24; --panel2:#0f1620;
      --text:#e7eef8; --muted:#a7b3c6; --line:#223142;
      --accent:#6aa9ff; --good:#47d18c; --hard:#ffb020; --again:#ff5c7a; --easy:#7cdbff;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{margin:0; background:radial-gradient(1200px 600px at 20% -10%, rgba(106,169,255,.25), transparent 60%),
                      radial-gradient(900px 700px at 120% 10%, rgba(71,209,140,.14), transparent 60%),
                      var(--bg);
         color:var(--text); font-family:var(--sans);}
    a{color:var(--accent); text-decoration:none}
    header{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,20,.65);
      border-bottom:1px solid rgba(34,49,66,.7);
    }
    .wrap{max-width:1100px; margin:0 auto; padding:14px 16px;}
    .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
    .brand{display:flex; gap:10px; align-items:center;}
    .dot{width:10px; height:10px; border-radius:99px; background:var(--accent); box-shadow: 0 0 0 4px rgba(106,169,255,.18);}
    .title{font-weight:800; letter-spacing:.2px}
    .subtitle{color:var(--muted); font-size:13px}
    nav{display:flex; gap:8px; flex-wrap:wrap; margin-left:auto}
    .tab{
      border:1px solid rgba(34,49,66,.85);
      background:rgba(18,26,36,.75);
      color:var(--text);
      padding:8px 10px; border-radius:999px;
      font-size:13px; cursor:pointer;
      transition:.15s ease;
      user-select:none;
    }
    .tab:hover{transform:translateY(-1px); border-color:rgba(106,169,255,.65)}
    .tab.active{background:rgba(106,169,255,.18); border-color:rgba(106,169,255,.75)}
    main{max-width:1100px; margin:0 auto; padding:18px 16px 42px;}
    .grid{display:grid; grid-template-columns: 1.2fr .8fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} nav{margin-left:0} }
    .card{
      background:linear-gradient(180deg, rgba(18,26,36,.92), rgba(15,22,32,.92));
      border:1px solid rgba(34,49,66,.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .hd{padding:14px 14px 10px; border-bottom:1px solid rgba(34,49,66,.75)}
    .card .hd h2{margin:0; font-size:16px}
    .card .hd p{margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.35}
    .card .bd{padding:14px}
    .pill{display:inline-flex; gap:8px; align-items:center; border:1px solid rgba(34,49,66,.9);
      background:rgba(18,26,36,.65); padding:8px 10px; border-radius:999px; font-size:13px; color:var(--muted)}
    .kpi{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
    @media (max-width: 520px){ .kpi{grid-template-columns:1fr} }
    .kpi .box{padding:12px; border-radius:14px; border:1px solid rgba(34,49,66,.85); background:rgba(18,26,36,.55)}
    .kpi .box .n{font-weight:900; font-size:22px}
    .kpi .box .l{color:var(--muted); font-size:12px; margin-top:4px}
    .btnrow{display:flex; gap:10px; flex-wrap:wrap;}
    button{
      border:1px solid rgba(34,49,66,.9);
      background:rgba(18,26,36,.78);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      transition:.12s ease;
      font-size:14px;
    }
    button:hover{transform:translateY(-1px); border-color:rgba(106,169,255,.6)}
    button.primary{background:rgba(106,169,255,.18); border-color:rgba(106,169,255,.72)}
    button.danger{background:rgba(255,92,122,.14); border-color:rgba(255,92,122,.55)}
    button.good{background:rgba(71,209,140,.14); border-color:rgba(71,209,140,.55)}
    button.hard{background:rgba(255,176,32,.14); border-color:rgba(255,176,32,.55)}
    button.easy{background:rgba(124,219,255,.12); border-color:rgba(124,219,255,.55)}
    button.small{padding:8px 10px; border-radius:10px; font-size:13px}
    .muted{color:var(--muted)}
    .mono{font-family:var(--mono)}
    .sep{height:1px; background:rgba(34,49,66,.75); margin:12px 0}
    .focus{
      display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
      border:1px dashed rgba(34,49,66,.9); border-radius:14px; padding:10px 12px;
      background:rgba(18,26,36,.35);
    }

    /* Flashcard UI */
    .flashwrap{display:flex; flex-direction:column; gap:10px;}
    .flashmeta{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    .tags{display:flex; gap:6px; flex-wrap:wrap}
    .tag{font-size:12px; color:var(--muted); border:1px solid rgba(34,49,66,.85); background:rgba(18,26,36,.5); padding:6px 8px; border-radius:999px}
    .bigcard{
      border:1px solid rgba(34,49,66,.9);
      background:rgba(18,26,36,.55);
      border-radius:18px;
      padding:16px;
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .bigcard .q{font-size:18px; font-weight:800; line-height:1.25}
    .bigcard .a{margin-top:14px; font-size:16px; line-height:1.35; color:var(--text)}
    .bigcard .hint{margin-top:10px; color:var(--muted); font-size:13px}
    .bigcard .corner{
      position:absolute; right:-20px; top:-20px;
      width:120px; height:120px; border-radius:30px;
      background: radial-gradient(circle at 30% 30%, rgba(106,169,255,.35), transparent 55%),

      transform: rotate(25deg);
      filter: blur(.2px);

    .answerHidden .a, .answerHidden .hint{display:none}

    .quizq{font-size:16px; font-weight:800; line-height:1.25}

<script>
/* ============================
   0) Utilidades
============================ */
const $ = (q, el=document) => el.querySelector(q);
const $$ = (q, el=document) => [...el.querySelectorAll(q)];
const uid = () => Math.random().toString(16).slice(2) + Date.now().toString(16);
const now = () => Date.now();
const dayMs = 24*60*60*1000;

function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
function fmtDate(t){
  const d = new Date(t);
  return d.toLocaleString(undefined, {year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"});
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================
   1) Deck (Base)
   - Você pode exportar/importar e expandir depois.
============================ */
const BUILTIN_DECK = {
  meta: {
    name: "Sistemas Operacionais — Prova (base)",
    version: 1,
    createdAt: now(),
    notes: "Deck base alinhado aos slides de revisão e ao material principal."
  },
  cards: [
    // Conceitos de SO
    c("so_def_1", "O que é um Sistema Operacional (SO)?",

      ["SO","conceito"]),
    c("so_fun_1", "Quais são as 2 funções centrais do SO (visão do material)?",
      "1) Facilitar o acesso aos recursos do sistema. 2) Organizar o compartilhamento de recursos garantindo proteção.",
      ["SO","funções"]),
    c("so_camadas_1", "Como funciona a ideia de camadas na comunicação do SO?",
      "Usuário interage com aplicações → aplicações interagem com o SO → SO se comunica com o hardware/dispositivos.",
      ["SO","camadas"]),
    c("so_serv_1", "Liste serviços principais do SO (conforme material).",
      "Carregar programa na memória e executar; sistema de arquivos (criar/ler/escrever/excluir); interface com periféricos; monitoração de recursos (gargalos); armazenar/manter estado do sistema.",
      ["SO","serviços"]),

    // Kernel e interpretador
    c("kernel_1", "O que é o Kernel?",
      "É o núcleo do sistema operacional, responsável por gerenciar recursos (processador/CPU, memória, sistema de arquivos e dispositivos de entrada/saída).",
      ["Kernel","SO"]),
    c("shell_1", "Qual o papel do interpretador de comandos?",
      "Recebe comandos do usuário e realiza chamadas de sistema para que o Kernel execute as operações.",
      ["Kernel","comandos"]),

    // Tipos de SO
    c("mono_1", "O que caracteriza um SO monoprogramável (monotarefa)?",
      "Executa um único programa por vez, com recursos alocados exclusivamente para ele (mesmo que não use tudo). Ex.: MS-DOS.",
      ["Tipos","monoprogramável"]),
    c("multi_1", "O que caracteriza um SO multiprogramável (multitarefa)?",
      "Divide recursos entre vários programas; alterna execução para que a CPU não fique ociosa, permitindo várias tarefas 'ao mesmo tempo'.",
      ["Tipos","multiprogramável"]),
    c("batch_1", "O que é um sistema Batch?",
      "Processamento em lote (jobs), armazenado em fita/disco, sem exigir interação com o usuário; tende a ter tempo de resposta maior.",
      ["Tipos","batch"]),
    c("time_share_1", "O que é Tempo Compartilhado (time-sharing)?",
      "Divide o processamento em fatias de tempo; se uma fatia não concluir, o SO interrompe e o processo aguarda nova fatia; permite interação por comandos.",
      ["Tipos","tempo compartilhado"]),
    c("real_time_1", "O que é sistema de Tempo Real (conforme material)?",
      "Diferem do tempo compartilhado: não há conceito de fatia de tempo; o processador é usado pelo tempo necessário à execução da tarefa.",
      ["Tipos","tempo real"]),

    // Múltiplos processadores / acoplamento
    c("mp_1", "O que são sistemas com múltiplos processadores?",
      "Utilizam duas ou mais UCPs/CPUs trabalhando em conjunto; permitem executar vários programas simultaneamente e dividir processamento entre processadores.",
      ["Multiprocessadores"]),
    c("acopl_1", "Diferença: fortemente acoplados x fracamente acoplados",
      "Fortemente: vários processadores compartilham uma memória física; E/S gerenciada por um único SO (multiprocessadores). Fracamente: sistemas interconectados em rede, cada um com seu SO e gerência própria.",
      ["Multiprocessadores","acoplamento"]),
    c("smp_1", "O que é SMP (fortemente acoplado)?",
      "Processos/CPUs têm o mesmo tempo de acesso à memória principal pelos processadores.",
      ["SMP","Multiprocessadores"]),
    c("numa_1", "O que é NUMA (fortemente acoplado)?",
      "Trabalha com conjunto de processos que compartilham processadores e memória; tempo de execução/acesso pode variar conforme o conjunto (não uniforme).",
      ["NUMA","Multiprocessadores"]),
    c("rede_dist_1", "Diferença: SO de rede (SOR) x Sistemas Distribuídos",
      "SOR: permite que servidor compartilhe recursos com outros computadores/dispositivos. Distribuídos: tratam sistemas interligados como se fossem um único sistema.",
      ["Rede","Distribuídos"]),

    // Processos (definição detalhada do slide de revisão)
    c("proc_def_1", "O que é um processo (definição completa da revisão)?",
      "Um processo pode ser definido como um programa em execução incluindo valores do contador de programa atual, registradores e variáveis; também pode ser visto como instância de um programa em execução (incluindo variáveis).",
      ["Processos","conceito"]),
    c("proc_states_1", "Quais estados de processo a revisão/material destaca?",
      "Em execução, Pronto, Bloqueado (espera).",
      ["Processos","estados"]),
    c("proc_block_1", "O que significa processo Bloqueado (espera)?",
      "Está aguardando evento externo (ex.: usuário) ou recurso/dispositivo de E/S para continuar.",
      ["Processos","estados"]),
    c("proc_ready_1", "O que significa processo Pronto?",
      "Está apto a executar, aguardando a CPU/escala; o SO decide a ordem/tempo de uso.",

    // Threads
    c("thread_1", "O que é uma thread?",
      "Unidade básica de execução; um 'processo leve' (subprocesso) dentro de um processo maior; permite execução concorrente e compartilhamento de recursos no mesmo espaço de memória.",
      ["Threads","conceito"]),
    c("thread_vs_proc_1", "Por que threads são mais leves que processos?",
      "Porque threads do mesmo processo compartilham recursos e espaço de memória, tornando criação/gerência mais eficiente.",
      ["Threads","processos"]),

    // Sistema de arquivos / caminhos
    c("fs_path_1", "Diferença: caminho absoluto x relativo",
      "Absoluto: do diretório-raiz até o arquivo, único (Windows usa \\ e Unix usa /). Relativo: depende do diretório atual/de trabalho.",
      ["Arquivos","caminhos"]),
    c("fs_workdir_1", "O que Tanenbaum destaca sobre diretório de trabalho por processo?",
      "Cada processo possui seu próprio diretório de trabalho; mudanças não afetam outros processos nem deixam vestígios no sistema de arquivos.",
      ["Arquivos","processos"]),

    // Memória / multiprogramação
    c("share_time_space_1", "Compartilhamento no tempo x no espaço",
      "Tempo: programas aguardam sua vez; SO decide quem usa e por quanto. Espaço: vários programas usam partes do recurso simultaneamente (ex.: memória dividida).",

      ["Memória","paginação"]),

    // Máquina virtual
    c("vm_1", "Máquina virtual: o que é e para que serve?",
      "Um nível intermediário entre SO e hardware que permite rodar um SO dentro de outro, isolando ambientes e aumentando compatibilidade/segurança.",

    c("vm_virus_1", "Máquina virtual é imune a vírus?",
      "Não. Ela pode ser infectada; em geral, o problema fica no ambiente virtual e não compromete diretamente o hardware (depende das configurações).",
      ["Máquina virtual","segurança"]),

    // Controle de acesso (caso da empresa)
    c("access_1", "Por que usuários conseguiram apagar arquivos importantes de outros setores?",

function c(id, front, back, tags=[], extra={}){
  return {
    id,
    front,
    back,
    tags,
    prereq: extra.prereq ?? [],
    source: extra.source ?? "",
  };
}

/* ============================
   2) Persistência (localStorage)
============================ */
const LS_KEY = "so_study_guided_v1";

function loadState(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw){
    return initStateFromBuiltin();
  }
  try{
    const st = JSON.parse(raw);
    // Migração simples: se não tiver deck, recria
    if(!st.deck || !st.deck.cards) return initStateFromBuiltin();
    return st;
  }catch{
    return initStateFromBuiltin();
  }
}

function saveState(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function initStateFromBuiltin(){
  const st = {
    deck: structuredClone(BUILTIN_DECK),
    // SM-2 simplificado por card
    srs: {}, // {cardId: {ease, intervalDays, reps, due, lapses, lastGrade}}
    stats: {
      createdAt: now(),
      totalReviews: 0,
      totalCorrect: 0,
      totalWrong: 0,
      quizRuns: 0,
      quizBest: 0,
      streak: 0,
      lastReviewAt: 0,
    },
    settings: {
      focusMode: true,
      showHints: false,
      dailyGoal: 25,
      quizCount: 10,
      quizFrom: "dueFirst", // dueFirst | random
    },
    session: {
      currentCardId: null,
      cardSide: "front", // front|back
      lastQuiz: null
    }
  };

  // Inicializa SRS de cada card
  for(const card of st.deck.cards){
    st.srs[card.id] = {
      ease: 2.3,          // fator de facilidade
      intervalDays: 0,    // intervalo atual em dias
      reps: 0,            // repetições corretas seguidas
      due: now(),         // pronto agora
      lapses: 0,
      lastGrade: null
    };
  }
  return st;
}

let state = loadState();

/* ============================
   3) SRS (SM-2 simplificado)
   Botões: Again(0), Hard(3), Good(4), Easy(5)
============================ */
function gradeToLabel(g){
  if(g===0) return "Errei";
  if(g===3) return "Difícil";
  if(g===4) return "Bom";
  if(g===5) return "Fácil";
  return "";
}

function applyGrade(cardId, grade){
  const s = state.srs[cardId];
  const prevDue = s.due;

  // Atualiza ease (SM-2 simplificado)
  // EF' = EF + (0.1 - (5-q)*(0.08 + (5-q)*0.02))
  const q = grade===0 ? 0 : grade; // 0/3/4/5
  const ef = s.ease;
  const ef2 = clamp(ef + (0.1 - (5-q)*(0.08 + (5-q)*0.02)), 1.3, 2.7);

  if(grade === 0){
    s.reps = 0;
    s.intervalDays = 0;
    s.lapses += 1;
    s.due = now() + 10*60*1000; // 10 minutos (rever na sessão)
    state.stats.totalWrong += 1;
    state.stats.streak = 0;
  }else{
    s.reps += 1;

    if(s.reps === 1) s.intervalDays = 1;
    else if(s.reps === 2) s.intervalDays = 3;
    else{
      // Hard encurta um pouco
      const mult = grade===3 ? 1.2 : grade===4 ? 1.7 : 2.2;
      s.intervalDays = Math.round(Math.max(1, s.intervalDays * mult * ef2));
    }

    // Ajuste: hard reduz EF levemente; easy aumenta um pouco
    if(grade===3) s.ease = clamp(ef2 - 0.05, 1.3, 2.7);
    else if(grade===5) s.ease = clamp(ef2 + 0.05, 1.3, 2.7);
    else s.ease = ef2;

    s.due = now() + s.intervalDays * dayMs;

    state.stats.totalCorrect += 1;
    state.stats.streak += 1;
  }

  s.lastGrade = grade;

  state.stats.totalReviews += 1;
  state.stats.lastReviewAt = now();

  saveState();
}

/* ============================
   4) Seleção de cards
============================ */
function getDeckCards(){
  return state.deck.cards;
}

function dueCards(){
  const t = now();
  return getDeckCards().filter(c => (state.srs[c.id]?.due ?? t) <= t);
}

function upcomingCards(limit=8){
  const cards = getDeckCards()
    .map(c => ({c, due: state.srs[c.id].due}))
    .sort((a,b)=>a.due-b.due)
    .slice(0, limit);
  return cards;
}

function pickNextCard(){
  const d = dueCards();
  if(d.length === 0){
    // pega o próximo mais próximo
    const up = upcomingCards(1)[0];
    return up ? up.c : getDeckCards()[0];
  }
  // prioriza cards vencidos há mais tempo + lapses
  const scored = d.map(c=>{
    const s = state.srs[c.id];
    const overdue = Math.max(0, now() - s.due);
    const score = overdue + s.lapses*2*60*60*1000; // lapses pesa
    return {c, score};
  }).sort((a,b)=>b.score-a.score);

  return scored[0].c;
}

function setCurrentCard(card){
  state.session.currentCardId = card.id;
  state.session.cardSide = "front";
  saveState();
}

function getCurrentCard(){
  const id = state.session.currentCardId;
  const card = getDeckCards().find(c=>c.id===id);
  if(card) return card;
  const next = pickNextCard();
  setCurrentCard(next);
  return next;
}

/* ============================
   5) Quiz (simulado)
============================ */
function buildQuiz(count){
  const cards = getDeckCards();
  const dueFirst = dueCards();
  const pool = (state.settings.quizFrom==="dueFirst" && dueFirst.length>=count)
    ? shuffle(dueFirst).slice(0, count)
    : shuffle(cards).slice(0, count);

  // criar questões a partir de cards (frente = enunciado; correta = back)
  const questions = pool.map((card, idx)=>{
    const others = shuffle(cards.filter(c=>c.id!==card.id)).slice(0, 3);
    const opts = shuffle([
      {text: card.back, correct: true},
      ...others.map(o=>({text:o.back, correct:false}))
    ]);
    return {
      id: "q_" + idx + "_" + card.id,
      prompt: card.front,
      options: opts,
      answerIdx: opts.findIndex(o=>o.correct),
      chosenIdx: null,
      cardId: card.id,
      explain: card.back
    };
  });

  return {
    createdAt: now(),
    count,
    idx: 0,
    questions,
    done: false,
    score: 0
  };
}

function startQuiz(){
  state.session.lastQuiz = buildQuiz(state.settings.quizCount);
  saveState();
}

function answerQuiz(qIdx, optIdx){
  const quiz = state.session.lastQuiz;
  if(!quiz || quiz.done) return;

  const q = quiz.questions[qIdx];
  if(q.chosenIdx != null) return;

  q.chosenIdx = optIdx;
  const correct = (optIdx === q.answerIdx);
  if(correct) quiz.score += 1;

  // se errou, marca card como "again" cedo
  if(!correct){
    const s = state.srs[q.cardId];
    s.due = Math.min(s.due, now() + 15*60*1000);
    s.lapses += 1;
    state.stats.totalWrong += 1;
    state.stats.streak = 0;
  }else{
    state.stats.totalCorrect += 1;
    state.stats.streak += 1;
  }

  state.stats.quizRuns += 1; // conta respostas
  saveState();
}

function finishQuiz(){
  const quiz = state.session.lastQuiz;
  if(!quiz) return;
  quiz.done = true;

  const pct = Math.round((quiz.score/quiz.count)*100);
  state.stats.quizBest = Math.max(state.stats.quizBest, pct);

  saveState();
}

function bindCards(){
  const card = getCurrentCard();
  const big = $("#bigcard");

  // hints toggle
  if(!state.settings.showHints){
    big.classList.add("noHints");
    // hint é controlado por classes answerHidden/Shown
  }

  $("#toggleAnswer").addEventListener("click", ()=>toggleAnswer());
  $("#nextCard").addEventListener("click", ()=>{
    setCurrentCard(pickNextCard());
    render();
  });

  $("#dailyGoal").addEventListener("change", (e)=>{
    state.settings.dailyGoal = clamp(parseInt(e.target.value||"25",10), 5, 200);
    saveState();
  });
  $("#quizCount").addEventListener("change", (e)=>{
    state.settings.quizCount = clamp(parseInt(e.target.value||"10",10), 5, 50);
    saveState();
  });

  $("#goQuiz2").addEventListener("click", ()=>{ setRoute("quiz"); startQuiz(); render(); });

  $("#resetSession").addEventListener("click", ()=>{
    state.session.currentCardId = null;
    state.session.cardSide = "front";
    saveState();
    render();
  });

  function doGrade(g){
    if(state.session.cardSide==="front"){
      alert("Mostre a resposta antes de pontuar 🙂");
      return;
    }
    applyGrade(card.id, g);
    bumpDailyCount();

    // próximo card
    setCurrentCard(pickNextCard());
    render();
  }

  $("#g0").addEventListener("click", ()=>doGrade(0));
  $("#g3").addEventListener("click", ()=>doGrade(3));
  $("#g4").addEventListener("click", ()=>doGrade(4));
  $("#g5").addEventListener("click", ()=>doGrade(5));

  // teclado: espaço vira; 1-4 grades
  window.onkeydown = (ev)=>{
    // não capturar em inputs/textarea
    const tag = (ev.target && ev.target.tagName) ? ev.target.tagName.toLowerCase() : "";
    if(tag==="input" || tag==="textarea" || tag==="select") return;

    if(ev.code==="Space"){
      ev.preventDefault();
      toggleAnswer();
    }
    if(ev.key==="1") doGrade(0);
    if(ev.key==="2") doGrade(3);
    if(ev.key==="3") doGrade(4);
    if(ev.key==="4") doGrade(5);
  };

  function toggleAnswer(){
    state.session.cardSide = (state.session.cardSide==="front") ? "back" : "front";
    saveState();
    render();
  }
}

function bindQuiz(){
  $("#startQuiz").addEventListener("click", ()=>{
    startQuiz();
    render();
  });

  const quizSettings = $("#quizSettings");
  if(quizSettings) quizSettings.addEventListener("click", ()=>{
    // só rolar; aqui mantemos simples
    window.scrollTo({top: 99999, behavior:"smooth"});
  });

  const quiz = state.session.lastQuiz;
  if(!quiz) return;

  if(quiz.done){
    const newQuiz = $("#newQuiz");
    if(newQuiz) newQuiz.addEventListener("click", ()=>{
      startQuiz(); render();
    });
    return;
  }

  const q = quiz.questions[quiz.idx];

  // selecionar alternativa (radio)
  $$(".opt input[type='radio']").forEach(r=>{
    r.addEventListener("change", (e)=>{
      q._pendingChoice = parseInt(e.target.dataset.opt, 10);
    });
  });

  const confirm = $("#confirmQuiz");
  if(confirm){
    confirm.addEventListener("click", ()=>{
      if(q._pendingChoice==null){
        alert("Escolha uma alternativa 🙂");
        return;
      }
      answerQuiz(quiz.idx, q._pendingChoice);
      render();
    });
  }

  const skip = $("#skipQuiz");
  if(skip){
    skip.addEventListener("click", ()=>{
      // pula sem marcar
      quiz.idx = Math.min(quiz.count-1, quiz.idx+1);
      if(quiz.idx===quiz.count-1 && quiz.questions[quiz.idx].chosenIdx!=null){
        // nada
      }
      saveState();
      render();
    });
  }

  const next = $("#nextQuiz");
  if(next){
    next.addEventListener("click", ()=>{
      if(quiz.idx < quiz.count-1){
        quiz.idx += 1;
        saveState();
        render();
      }else{
        finishQuiz();
        render();
      }
    });
  }

  // config rápida
  $("#saveQuizCfg").addEventListener("click", ()=>{
    state.settings.quizCount = clamp(parseInt($("#quizCount2").value||"10",10), 5, 50);
    state.settings.quizFrom = $("#quizFrom").value;
    saveState();
    alert("Config salva ✅");
    render();
  });

  $("#clearQuiz").addEventListener("click", ()=>{
    state.session.lastQuiz = null;
    saveState();
    render();
  });
}

function bindDeck(){
  $("#exportDeck").addEventListener("click", ()=>{
    const blob = new Blob([JSON.stringify(state.deck, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "deck_sistemas_operacionais.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  });

  $("#importDeck").addEventListener("click", ()=>{
    const txt = $("#importArea").value.trim();
    if(!txt){
      alert("Cole o JSON do deck primeiro.");
      return;
    }
    try{
      const deck = JSON.parse(txt);
      if(!deck.cards || !Array.isArray(deck.cards)) throw new Error("Formato inválido: falta cards[]");

      // substitui deck e re-cria srs mantendo o que bater por id
      const oldSrs = state.srs;
      state.deck = deck;
      state.srs = {};

      for(const card of deck.cards){
        state.srs[card.id] = oldSrs[card.id] ?? {
          ease: 2.3, intervalDays: 0, reps: 0, due: now(), lapses: 0, lastGrade: null
        };
      }
      // se currentCard não existir, reset
      if(!deck.cards.some(c=>c.id===state.session.currentCardId)){
        state.session.currentCardId = null;
        state.session.cardSide = "front";
      }

      saveState();
      alert("Deck importado ✅");
      render();
    }catch(e){
      alert("Erro ao importar: " + e.message);
    }
  });

  $("#resetAll").addEventListener("click", ()=>{
    if(!confirm("Isso apaga TODO o progresso e volta ao deck padrão. Confirmar?")) return;
    localStorage.removeItem(LS_KEY);
    state = loadState(); // recria
    render();
  });
}

function bindSettings(){
  $("#saveSettings").addEventListener("click", ()=>{
    state.settings.focusMode = ($("#focusMode").value === "true");
    state.settings.showHints = ($("#showHints").value === "true");
    saveState();
    alert("Configurações salvas ✅");
    render();
  });
}

/* ============================
   9) Diário (meta por dia)
============================ */
function dailyKey(){
  return new Date().toISOString().slice(0,10);
}
function getDailyCount(key){
  const k = "so_daily_" + key;
  return parseInt(localStorage.getItem(k)||"0", 10);
}
function bumpDailyCount(){
  const k = "so_daily_" + dailyKey();
  const n = parseInt(localStorage.getItem(k)||"0", 10) + 1;
  localStorage.setItem(k, String(n));
}

/* ============================
   10) Segurança XSS básica
============================ */
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* ============================
   11) Boot
============================ */
(function boot(){
  // Se não tem card atual, seta
  if(!state.session.currentCardId){
    setCurrentCard(pickNextCard());
  }
  render();
})();
</script>
